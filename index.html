<!DOCTYPE html>
<html>
    <head>
        <title>Dev Tools - V1</title>

    <body>
        <div class="home-header">
            <a href="/" class="home-logo-link">
                <img src="/img/light_logo.png" class="home-logo">
            </a>
            <div style="display: flex; flex-direction: row; justify-content: center;">
                <h1 class="home-h1">It's your all Dev Tools</h1>
                <span class="hooray">!</span>
            </div>
        </div>
        <div class="home-container">
            <div class="home-controller">
                <p class="home-p">Here you are; This is a Lorm Ipsum!</p>
                <div style="display: flex; flex-direction: row; gap: 10px;">
                    <button class="button-type1" onclick="lorem()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-refresh-ccw-icon lucide-refresh-ccw"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>

                        <p id="copy-text" style="display: none; margin: 0;">Copied!</p>
                    </button>
                </div>
            </div>
            <textarea id="lorem-ipsum" class="home-textarea" rows="15" readonly></textarea>
        </div>

        <div class="footer">
            <hr>
            <div style="display: flex; flex-direction: row; gap: 10px;">
                <p style="color: #9b9b9b;">Dev Tool v1.0.0</p>
                <p style="color: #10b981;">● Online</p>
            </div>
        </div>
        <script src="/components/tools.js"></script>
        <script src="/components/lorem-ipsum.js"></script>
